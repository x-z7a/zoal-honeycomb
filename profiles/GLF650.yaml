metadata:
    name: GLF650 AKD XP12
    description: Profile for Gulfstream GLF650 by AKD
    selectors:
        - GLF650_AKD
buttons:
    hdg:
        single_click:
            - command_str: sim/autopilot/heading
        double_click:
            - command_str: sim/autopilot/heading_sync_pilot
    nav:
        single_click:
            - command_str: AKD/autopilot/LNAV_cmd
        double_click:
            - command_str: sim/autopilot/gpss
    alt:
        single_click:
            - command_str: sim/autopilot/altitude_hold
        double_click:
            - command_str: sim/autopilot/altitude_hold
    apr:
        single_click:
            - command_str: sim/autopilot/approach
        double_click:
            - command_str: sim/autopilot/approach
    vs:
        single_click:
            - command_str: sim/autopilot/vertical_speed
        double_click:
            - command_str: sim/autopilot/vertical_speed
    ap:
        single_click:
            - command_str: sim/autopilot/servos_toggle
        double_click:
            - command_str: sim/autopilot/servos_toggle
    ias:
        single_click:
            - command_str: sim/autopilot/speed_hold
        double_click:
            - command_str: sim/autopilot/speed_hold
    rev:
        single_click:
            - command_str: sim/autopilot/back_course
        double_click:
            - command_str: sim/autopilot/back_course
knobs:
    ap_hdg:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/heading_dial_deg_mag_pilot
    ap_vs:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/vvi_dial_fpm
    ap_alt:
        commands:
            - command_str: AKD/autopilot/MCP_alt_up_cmd
            - command_str: AKD/autopilot/MCP_alt_dn_cmd
    ap_ias:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/airspeed_dial_kts_mach
    ap_crs:
        datarefs:
            - dataref_str: sim/cockpit2/radios/actuators/nav1_obs_deg_mag_pilot
leds:
    hdg:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/heading_mode
              operator: ==
              threshold: 1
    nav:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/nav_status
              operator: '>='
              threshold: 1
            - dataref_str: sim/cockpit2/autopilot/gpss_status
              operator: '>='
              threshold: 1
        condition: any
    alt:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/altitude_hold_status
              operator: '>='
              threshold: 1
    apr:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/approach_status
              operator: ==
              threshold: 2
    vs:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/vvi_status
              operator: ==
              threshold: 2
    ap:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/servos_on
              operator: '>'
              threshold: 0.01
    ias:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/altitude_mode
              operator: ==
              threshold: 5
    rev:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/backcourse_status
              operator: ==
              threshold: 1
    gear:
        datarefs:
            - dataref_str: sim/flightmodel2/gear/deploy_ratio
              operator: '!='
    master_warn:
        datarefs:
            - dataref_str: AKD/CAS/master_warning_lamp_status
              operator: ==
              threshold: 1
    master_caution:
        datarefs:
            - dataref_str: AKD/CAS/master_caution_lamp_status
              operator: ==
              threshold: 1
    fire:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/engine_fires
              operator: '>'
              threshold: 0.01
    oil_low_pressure:
        datarefs:
            - dataref_str: AKD/ENG/ENG_L_oil_press
              operator: ==
              threshold: 0
            - dataref_str: AKD/ENG/ENG_R_oil_press
              operator: ==
              threshold: 0
        condition: any
    fuel_low_pressure:
        datarefs:
            - dataref_str: sim/cockpit/warnings/annunciators/fuel_pressure
              operator: ==
              threshold: 3
    anti_ice:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/pitot_heat
              operator: '>'
              threshold: 0.01
    eng_starter:
        datarefs:
            - dataref_str: sim/cockpit2/engine/actuators/starter_hit
              operator: '>'
              threshold: 0.01
    apu:
        datarefs:
            - dataref_str: sim/cockpit2/electrical/APU_running
              operator: '>'
              threshold: 0.01
        condition: any
    vacuum:
        datarefs:
            - dataref_str: sim/cockpit/misc/vacuum
              operator: <
              threshold: 6
    hydro_low_pressure:
        datarefs:
            - dataref_str: AKD/hyd/hydraulic_pressure_1
              operator: <
              threshold: 3000
            - dataref_str: AKD/hyd/hydraulic_pressure_2
              operator: <
              threshold: 3000
    aux_fuel_pump:
        datarefs:
            - dataref_str: sim/cockpit/engine/fuel_pump_on
              operator: ==
              threshold: 0
            - dataref_str: sim/cockpit/engine/fuel_pump_on
              index: 1
              operator: ==
              threshold: 0
            - dataref_str: sim/cockpit/engine/fuel_pump_on
              index: 2
              operator: ==
              threshold: 0
            - dataref_str: sim/cockpit/engine/fuel_pump_on
              index: 3
              operator: ==
              threshold: 0
        condition: all
    parking_brake:
        datarefs:
            - dataref_str: sim/cockpit2/controls/parking_brake_ratio
              operator: ==
              threshold: 1
    volt_low:
        datarefs:
            - dataref_str: sim/cockpit2/electrical/bus_volts
              operator: <
              threshold: 27
    doors:
        datarefs:
            - dataref_str: AKD/doors/toggle_main_door_switch
              operator: ==
              threshold: 1
            - dataref_str: AKD/doors/toggle_cargo_door_switch
              operator: ==
              threshold: 1
        condition: any
data:
    ap_alt_step:
        value: 100
    ap_vs_step:
        value: 50
    ap_ias_step:
        value: 1
conditions:
    bus_voltage:
        datarefs:
            - dataref_str: sim/cockpit2/electrical/bus_volts
              operator: '>'
              threshold: 0.01
