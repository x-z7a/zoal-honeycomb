name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Import Apple code signing cert
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Build wails (macOS)
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: bravo
          build-platform: darwin/universal
          nsis: false
          go-version: "1.23.4"
          package: false

      - name: Sign and notarize macOS app
        run: |
          codesign \
            --force --deep --timestamp --options runtime \
            --sign "${{ secrets.CODESIGN_IDENTITY }}" \
            ${{ github.workspace }}/build/bin/bravo.app

          ditto -c -k --keepParent \
            ${{ github.workspace }}/build/bin/bravo.app \
            ${{ github.workspace }}/build/bin/bravo.zip

          xcrun notarytool submit ${{ github.workspace }}/build/bin/bravo.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.MAC_DEV_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAMID }}" \
            --wait

          xcrun stapler staple ${{ github.workspace }}/build/bin/bravo.app
          xcrun stapler validate ${{ github.workspace }}/build/bin/bravo.app

      - name: Build mac XPL plugin
        run: |
          go mod tidy
          VERSION=${GITHUB_REF##*/} make mac
          rm -f build/zoal-honeycomb/mac_arm.xpl build/zoal-honeycomb/mac_amd.xpl

      - name: Sign mac XPL plugin
        run: |
          codesign --force --timestamp --options runtime \
            --sign "${{ secrets.CODESIGN_IDENTITY }}" \
            build/zoal-honeycomb/mac.xpl

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-mac
          path: |
            build/bin/bravo.app
            build/zoal-honeycomb/mac.xpl

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            make
            mingw-w64-x86_64-toolchain

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Build wails (Windows)
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: bravo
          build-platform: windows/amd64
          nsis: false
          go-version: "1.23.4"
          package: false

      - name: Build Windows XPL plugin
        shell: msys2 {0}
        run: |
          VERSION=${GITHUB_REF##*/} make win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: |
            build/bin/bravo
            build/zoal-honeycomb/win.xpl

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libudev-dev

      - name: Build wails (Linux)
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: bravo
          build-platform: linux/amd64
          nsis: false
          go-version: "1.23.4"
          package: false

      - name: Build Linux XPL plugin
        run: |
          export VERSION=${GITHUB_REF##*/}
          CGO_ENABLED=1 \
          CGO_CFLAGS="-DLIN=1 -DAPL=0 -DIBM=0 -O2 -g" \
          CGO_LDFLAGS="-shared -rdynamic -nodefaultlibs" \
          go build -buildmode c-shared -o build/zoal-honeycomb/lin.xpl \
            -ldflags="-X github.com/x-z7a/zoal-honeycomb/pkg/xplane.VERSION=${VERSION}" plugin/plugin.go

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: |
            build/bin/bravo
            build/zoal-honeycomb/lin.xpl

  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-mac
          path: artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-linux
          path: artifacts/linux

      - name: Assemble release package
        run: |
          TAG=${GITHUB_REF##*/}
          mkdir -p build/zoal-honeycomb

          # macOS artifacts
          ditto artifacts/mac/bin/bravo.app build/zoal-honeycomb/bravo.app
          cp artifacts/mac/zoal-honeycomb/mac.xpl build/zoal-honeycomb/mac.xpl

          # Windows artifacts
          cp artifacts/windows/bin/bravo build/zoal-honeycomb/bravo.exe
          cp artifacts/windows/zoal-honeycomb/win.xpl build/zoal-honeycomb/win.xpl

          # Linux artifacts
          cp artifacts/linux/bin/bravo build/zoal-honeycomb/bravo
          cp artifacts/linux/zoal-honeycomb/lin.xpl build/zoal-honeycomb/lin.xpl

          # Config and profiles
          cp skunkcrafts_updater.cfg build/zoal-honeycomb/
          cp -r profiles build/zoal-honeycomb/
          sed -i '' "s/REPLACE_ME/${TAG}/g" build/zoal-honeycomb/skunkcrafts_updater.cfg
          printf '%s\n' "${TAG}" > build/zoal-honeycomb/${TAG}

      - name: Notarize release zip
        run: |
          root=$(pwd)
          cd build && \
            ditto -c -k --sequesterRsrc --keepParent zoal-honeycomb zoal-honeycomb.zip && \
            cd $root

          xcrun notarytool submit build/zoal-honeycomb.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.MAC_DEV_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAMID }}" \
            --wait

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          bash scripts/generate-release-notes.sh "${{ runner.temp }}/release-notes.md" "${GITHUB_REF##*/}"

      - name: Prepare release branch and checksums
        run: |
          cp -r build/zoal-honeycomb/ release/

          # Create CRC32 checksums
          rm -f release/skunkcrafts_updater_whitelist.txt
          find release -type f ! \( -name '*skunkcrafts_updater*' -o -path '*skunkcrafts_updater*' \) -print0 | while IFS= read -r -d '' file; do
            checksum_hex=$(crc32 "$file")
            checksum_decimal=$((16#$checksum_hex))
            modified_file="${file#release/}"
            echo "$modified_file|$checksum_decimal" >> release/skunkcrafts_updater_whitelist.txt
          done
          touch release/skunkcrafts_updater_blacklist.txt

          TAG=${GITHUB_REF##*/}
          TARGET_BRANCH="release"
          git checkout -b ${TARGET_BRANCH}
          git add .
          git commit -m "new ${TARGET_BRANCH} - ${TAG}"
          git push -f -u origin ${TARGET_BRANCH}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            ${{ github.workspace }}/build/zoal-honeycomb.zip
          prerelease: ${{ contains(github.ref_name, '-') }}
