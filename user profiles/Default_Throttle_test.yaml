metadata:
    name: Default_Throttle
    description: Imported from Default_Throttle
    selectors:
        - Test
buttons:
    hdg:
        single_click:
            - command_str: sim/autopilot/heading
        double_click:
            - command_str: sim/autopilot/heading_sync_pilot
    nav:
        single_click:
            - command_str: sim/autopilot/NAV
        double_click:
            - command_str: sim/autopilot/gpss
    alt:
        single_click:
            - command_str: sim/autopilot/altitude_hold
        double_click:
            - command_str: sim/autopilot/altitude_hold
    apr:
        single_click:
            - command_str: sim/autopilot/approach
        double_click:
            - command_str: sim/autopilot/approach
    vs:
        single_click:
            - command_str: sim/autopilot/vertical_speed
        double_click:
            - command_str: sim/autopilot/vnav
    ap:
        single_click:
            - command_str: sim/autopilot/servos_toggle
        double_click:
            - command_str: sim/autopilot/servos_toggle
    ias:
        single_click:
            - command_str: sim/autopilot/speed_hold
        double_click:
            - command_str: sim/autopilot/speed_hold
    rev:
        single_click:
            - command_str: sim/autopilot/back_course
        double_click:
            - command_str: sim/autopilot/back_course
knobs:
    ap_hdg:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/heading_dial_deg_mag_pilot
    ap_vs:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/vvi_dial_fpm
    ap_alt:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/altitude_dial_ft
    ap_ias:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/airspeed_dial_kts_mach
    ap_crs:
        datarefs:
            - dataref_str: sim/cockpit2/radios/actuators/nav1_obs_deg_mag_pilot
leds:
    hdg:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/heading_mode
              operator: ==
              threshold: 1
    nav:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/nav_status
              operator: '>='
              threshold: 1
    alt:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/altitude_hold_status
              operator: '>='
              threshold: 1
    apr:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/approach_status
              operator: '>='
              threshold: 1
    vs:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/vvi_status
              operator: '>='
              threshold: 1
    ap:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/servos_on
              operator: ==
              threshold: 1
    ias:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/speed_status
              operator: '>='
              threshold: 1
    rev:
        datarefs:
            - dataref_str: sim/cockpit2/autopilot/backcourse_status
              operator: '>='
              threshold: 1
    gear:
        datarefs:
            - dataref_str: sim/flightmodel2/gear/deploy_ratio
              operator: '!='
    master_warn:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/master_warning
              operator: ==
              threshold: 1
    master_caution:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/master_caution
              operator: ==
              threshold: 1
    fire:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/engine_fires
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/engine_fires
              index: 1
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/engine_fires
              index: 2
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/engine_fires
              index: 3
              operator: ==
              threshold: 1
        condition: any
    oil_low_pressure:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/oil_pressure_low
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/oil_pressure_low
              index: 1
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/oil_pressure_low
              index: 2
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/oil_pressure_low
              index: 3
              operator: ==
              threshold: 1
        condition: any
    fuel_low_pressure:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/fuel_pressure_low
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/fuel_pressure_low
              index: 1
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/fuel_pressure_low
              index: 2
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/annunciators/fuel_pressure_low
              index: 3
              operator: ==
              threshold: 1
        condition: any
    anti_ice:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/pitot_heat
              operator: ==
              threshold: 0
    eng_starter:
        datarefs:
            - dataref_str: sim/cockpit2/engine/actuators/starter_hit
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/engine/actuators/starter_hit
              index: 1
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/engine/actuators/starter_hit
              index: 2
              operator: ==
              threshold: 1
            - dataref_str: sim/cockpit2/engine/actuators/starter_hit
              index: 3
              operator: ==
              threshold: 1
        condition: any
    apu:
        datarefs:
            - dataref_str: sim/cockpit/engine/APU_running
              operator: ==
              threshold: 1
    vacuum:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/low_vacuum
              operator: ==
              threshold: 1
    hydro_low_pressure:
        datarefs:
            - dataref_str: sim/cockpit/warnings/annunciators/hydraulic_pressure
              operator: ==
              threshold: 1
    aux_fuel_pump:
        datarefs:
            - dataref_str: sim/cockpit2/fuel/transfer_pump_left
              operator: ==
              threshold: 2
            - dataref_str: sim/cockpit2/fuel/transfer_pump_right
              operator: ==
              threshold: 2
        condition: any
    parking_brake:
        datarefs:
            - dataref_str: sim/flightmodel/controls/parkbrake
              operator: ==
              threshold: 1
    volt_low:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/low_voltage
              operator: ==
              threshold: 1
    doors:
        datarefs:
            - dataref_str: sim/cockpit2/annunciators/cabin_door_open
              operator: ==
              threshold: 1
data:
    ap_vs_step:
        value: 10
    ap_ias_step:
        value: 1
conditions:
    bus_voltage:
        datarefs:
            - dataref_str: sim/cockpit2/electrical/bus_volts
              operator: '>'
              threshold: 0
